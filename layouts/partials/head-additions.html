<link rel="stylesheet" href="/css/custom.css">
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
<script defer>
document.addEventListener('DOMContentLoaded', function() {
  // Mermaid init
  mermaid.initialize({ startOnLoad: false, theme: 'base', themeVariables: { primaryColor: '#dbeafe', primaryTextColor: '#1e3a5f', primaryBorderColor: '#3b82f6', lineColor: '#3b82f6', secondaryColor: '#f1f5f9', tertiaryColor: '#ede9fe' }});
  // Render visible mermaid blocks
  mermaid.run({ querySelector: '.mermaid' });

  // Scroll grid fade hint
  document.querySelectorAll('.scroll-grid').forEach(function(grid) {
    grid.addEventListener('scroll', function() {
      var container = grid.parentElement;
      if (!container || !container.classList.contains('scroll-container')) return;
      var atEnd = grid.scrollLeft + grid.clientWidth >= grid.scrollWidth - 10;
      container.classList.toggle('scrolled-end', atEnd);
    });
  });

  // Dialog system — handles any element with data-dialog attribute
  document.querySelectorAll('[data-dialog]').forEach(function(el) {
    el.addEventListener('click', function(e) {
      e.stopPropagation();
      var dialogId = el.getAttribute('data-dialog');
      var dialog = document.getElementById(dialogId);
      if (dialog) {
        dialog.classList.add('active');
        document.body.style.overflow = 'hidden';
        // Render mermaid inside newly visible dialog
        var pending = dialog.querySelectorAll('.mermaid:not([data-processed])');
        if (pending.length) mermaid.run({ nodes: pending });
      }
    });
  });

  document.querySelectorAll('.card-dialog').forEach(function(dialog) {
    dialog.addEventListener('click', function(e) {
      if (e.target === dialog) {
        dialog.classList.remove('active');
        document.body.style.overflow = '';
      }
    });
    var closeBtn = dialog.querySelector('.card-dialog-close');
    if (closeBtn) {
      closeBtn.addEventListener('click', function() {
        dialog.classList.remove('active');
        document.body.style.overflow = '';
      });
    }
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
      document.querySelectorAll('.card-dialog.active').forEach(function(d) {
        d.classList.remove('active');
        document.body.style.overflow = '';
      });
    }
  });

  // Tab system
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var container = btn.closest('.tab-container');
      container.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      container.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      var panel = container.querySelector('#' + btn.getAttribute('data-tab'));
      if (panel) panel.classList.add('active');
    });
  });
});
</script>
